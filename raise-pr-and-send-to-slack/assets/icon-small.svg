<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="PR and Slack review request skill icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#35b5ff"/>
      <stop offset="55%" stop-color="#3455d1"/>
      <stop offset="100%" stop-color="#8a2be2"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f5bd7"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0b1020" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="58" fill="url(#bg)"/>

  <circle cx="156" cy="155" r="102" fill="#fff" opacity="0.96"/>
  <circle cx="156" cy="155" r="84" fill="#111827"/>
  <!-- simple cat silhouette -->
  <g transform="translate(156 158)" fill="#fff">
    <path d="M-47 -41 L-30 -64 L-10 -47 C-4 -49 4 -49 10 -47 L30 -64 L47 -41 L47 14 C47 45 21 71 0 71 C-22 71 -47 45 -47 14 Z"/>
    <path d="M-44 33 C-62 21 -72 4 -67 -7 C-59 -6 -49 2 -40 17" fill="none" stroke="#fff" stroke-width="13" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="364" cy="147" r="92" fill="#fff" opacity="0.96"/>
    <!-- slack-ish mark -->
    <g transform="translate(364 147)">
      <rect x="-8" y="-44" width="30" height="84" rx="15" fill="#2eb67d"/>
      <rect x="-44" y="-8" width="84" height="30" rx="15" fill="#36c5f0"/>
      <rect x="-65" y="10" width="30" height="55" rx="15" fill="#e01e5a"/>
      <rect x="10" y="35" width="55" height="30" rx="15" fill="#ecb22e"/>
      <circle cx="-21" cy="-45" r="15" fill="#2eb67d"/>
      <circle cx="45" cy="-21" r="15" fill="#2eb67d"/>
      <circle cx="-45" cy="21" r="15" fill="#e01e5a"/>
      <circle cx="21" cy="45" r="15" fill="#ecb22e"/>
    </g>
  </g>

  <path d="M218 128 L310 128 L310 110 L360 152 L310 194 L310 176 L218 176 Z"
        fill="url(#arrowGrad)" opacity="0.95" filter="url(#shadow)"/>

  <!-- PR document -->
  <g filter="url(#shadow)">
    <path d="M74 284 h112 l44 44 v112 a18 18 0 0 1 -18 18 h-138 a18 18 0 0 1 -18 -18 v-138 a18 18 0 0 1 18 -18z" fill="#f8fafc"/>
    <path d="M186 284 v30 a14 14 0 0 0 14 14 h30" fill="#cbd5e1"/>
    <text x="116" y="342" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#374151">&lt;PR&gt;</text>
    <rect x="90" y="364" width="108" height="11" rx="5.5" fill="#a8b6cc"/>
    <rect x="90" y="390" width="76" height="11" rx="5.5" fill="#a8b6cc"/>
    <path d="M104 420 l40 38 l78 -80" fill="none" stroke="#28a745" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Slack review request bubble -->
  <g filter="url(#shadow)">
    <path d="M256 302 h184 a20 20 0 0 1 20 20 v88 a20 20 0 0 1 -20 20 h-104 l-28 26 v-26 h-52 a20 20 0 0 1 -20 -20 v-88 a20 20 0 0 1 20 -20z" fill="#ffffff"/>
    <rect x="236" y="302" width="224" height="62" rx="20" fill="url(#cardBlue)"/>
    <text x="258" y="346" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#ffffff">@core-dev</text>
    <text x="258" y="395" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#173f9d">Review Request</text>
    <g transform="translate(422 392)" fill="none" stroke="#1d74d6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-10 8 l16 -16 a14 14 0 0 1 20 20 l-16 16 a14 14 0 0 1 -20 -20z"/>
      <path d="M-26 -8 l16 -16 a14 14 0 1 1 20 20 l-16 16 a14 14 0 0 1 -20 -20z"/>
    </g>
  </g>
</svg>
